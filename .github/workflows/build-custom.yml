name: Build Kernel CI (Custom Variant)

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Custom Kernel Name (LOCALVERSION)"
        required: true
        type: string
        default: "-Kono-Ha-Kernel"
      spoof_uname:
        description: "Spoof Uname (SUSFS/Stock Naming)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      hz:
        description: 'Refresh Rate (HZ)'
        required: true
        type: choice
        options:
          - powersave
          - balance
          - performance
          - ultra-performance
        default: ultra-performance
      variant:
        description: 'Build Variant'
        required: true
        type: choice
        options:
          - stock
          - root
          - susfs
        default: susfs
      root:
        description: 'Root Method'
        required: true
        type: choice
        options:
          - none
          - ksu
          - ksu-next
          - sukisu
          - yukisu
          - resukisu
          - mambosu
          - apatch
          - folkpatch
        default: resukisu
      kpm:
        description: 'Kernel Patch Module (KPM)'
        required: true
        type: choice
        options:
          - 'off'
          - 'on'
        default: 'off'
      nomount:
        description: "NoMount VFS Redirection"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      hardened:
        description: 'Hardened Kernel'
        required: true
        type: choice
        options:
          - 'off'
          - 'on'
        default: 'off'
      bypasscharging:
        description: "Bypass Charging (MCA Override)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      droidspaces:
        description: "Droidspaces Support"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      htsr:
        description: "HTSR 240Hz Touch Sampling"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      wifi_exploit:
        description: "WiFi Performance Exploits (WLM, Coex, BBR)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      kgsl_exploit:
        description: "KGSL GPU Bypass (LM_LIMIT, DCVS)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      data_exploit:
        description: "Mobile Data Exploits (DFC, Powersave)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "on"
      debug:
        description: "Debug Mode (nokaslr, no optimizations)"
        required: true
        type: choice
        options:
          - "off"
          - "on"
        default: "off"


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-custom-kernel:
    name: "Custom Build"
    runs-on: ubuntu-24.04

    steps:
      - name: Parse Inputs
        id: setup_vars
        env:
          INPUT_HZ: ${{ inputs.hz }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_ROOT: ${{ inputs.root }}
          INPUT_KPM: ${{ inputs.kpm }}
          INPUT_NOMOUNT: ${{ inputs.nomount }}
          INPUT_HARDENED: ${{ inputs.hardened }}
          INPUT_BYPASS: ${{ inputs.bypasscharging }}
          INPUT_DROIDSPACES: ${{ inputs.droidspaces }}
          INPUT_HTSR: ${{ inputs.htsr }}
          INPUT_WIFI: ${{ inputs.wifi_exploit }}
          INPUT_KGSL: ${{ inputs.kgsl_exploit }}
          INPUT_DATA: ${{ inputs.data_exploit }}
          INPUT_DEBUG: ${{ inputs.debug }}
          INPUT_KERNEL_NAME: ${{ inputs.kernel_name }}
          INPUT_SPOOF_UNAME: ${{ inputs.spoof_uname }}
        run: |
          if [ "$INPUT_HZ" == "powersave" ]; then HZ_ID=100
          elif [ "$INPUT_HZ" == "balance" ]; then HZ_ID=250
          elif [ "$INPUT_HZ" == "performance" ]; then HZ_ID=500
          elif [ "$INPUT_HZ" == "ultra-performance" ]; then HZ_ID=1000
          fi
          echo "HZ_ID=$HZ_ID" >> $GITHUB_ENV

          ACTUAL_ROOT="$INPUT_ROOT"
          if [ "$INPUT_VARIANT" == "stock" ]; then
            ACTUAL_ROOT="none"
          fi
          echo "ACTUAL_ROOT=$ACTUAL_ROOT" >> $GITHUB_ENV

          if [ "$INPUT_VARIANT" == "stock" ]; then
            BUILD_NAME="${INPUT_VARIANT}-${INPUT_HZ}"
          else
            BUILD_NAME="${INPUT_VARIANT}-${ACTUAL_ROOT}-${INPUT_HZ}"
          fi
          
          if [ "$INPUT_KPM" == "on" ] || [ "$ACTUAL_ROOT" == "apatch" ] || [ "$ACTUAL_ROOT" == "folkpatch" ]; then 
            BUILD_NAME="${BUILD_NAME}-kpm"
          fi
          if [ "$INPUT_NOMOUNT" == "on" ]; then BUILD_NAME="${BUILD_NAME}-nomount"; fi
          if [ "$INPUT_HARDENED" == "on" ]; then BUILD_NAME="${BUILD_NAME}-hardened"; fi
          if [ "$INPUT_BYPASS" == "on" ]; then BUILD_NAME="${BUILD_NAME}-bypasscharging"; fi
          if [ "$INPUT_DROIDSPACES" == "on" ]; then BUILD_NAME="${BUILD_NAME}-droidspaces"; fi
          if [ "$INPUT_HTSR" == "off" ]; then BUILD_NAME="${BUILD_NAME}-nohtsr"; fi
          if [ "$INPUT_WIFI" == "off" ]; then BUILD_NAME="${BUILD_NAME}-nowifi"; fi
          if [ "$INPUT_KGSL" == "off" ]; then BUILD_NAME="${BUILD_NAME}-nokgsl"; fi
          if [ "$INPUT_DATA" == "off" ]; then BUILD_NAME="${BUILD_NAME}-nodata"; fi
          if [ "$INPUT_DEBUG" == "on" ]; then BUILD_NAME="${BUILD_NAME}-debug"; fi
          
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          
      - name: Rename Job
        run: echo "Mengubah nama proses untuk Build $BUILD_NAME"

      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - uses: actions/checkout@v4
        with:
          path: gki-clo

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 clang lld llvm jq

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchains
          git clone --depth=1 https://github.com/ZyCromerZ/Clang.git -b main toolchains/clang

      - name: Setup AnyKernel3
        run: |
          cd gki-clo
          [ ! -d "anykernel" ] && git clone https://github.com/osm0sis/AnyKernel3.git anykernel || true

      - name: Setup NoMount
        if: ${{ inputs.nomount == 'on' }}
        run: |
          echo "Fetching NoMount from maxsteeel repository..."
          git clone --depth=1 https://github.com/maxsteeel/nomount.git /tmp/nomount
          cd gki-clo
          
          KERNEL_VERSION=$(grep -E '^(VERSION|PATCHLEVEL)\s*=' Makefile | awk -F'=' '{print $2}' | tr -d ' ' | paste -sd '.' -)
          echo "Detected kernel version: $KERNEL_VERSION"
          
          PATCH_FILE=$(find /tmp/nomount -type f -name "nomount_${KERNEL_VERSION}*.patch" | head -n 1)
          
          if [ -f "$PATCH_FILE" ]; then
            echo "Applying NoMount patch: $PATCH_FILE"
            patch -p1 < "$PATCH_FILE"
            
            cp -r /tmp/nomount/kernel/src/* fs/
          else
            echo "Warning: NoMount patch for $KERNEL_VERSION not found in the repository!"
            exit 1
          fi

      - name: Build Kernel
        env:
          KPM_SUPERKEY_SECRET: ${{ secrets.KPM_SUPERKEY }}
          INPUT_VARIANT: ${{ inputs.variant }}
          INPUT_KPM: ${{ inputs.kpm }}
          INPUT_HARDENED: ${{ inputs.hardened }}
          INPUT_HTSR: ${{ inputs.htsr }}
          INPUT_WIFI: ${{ inputs.wifi_exploit }}
          INPUT_KGSL: ${{ inputs.kgsl_exploit }}
          INPUT_DATA: ${{ inputs.data_exploit }}
          INPUT_BYPASS: ${{ inputs.bypasscharging }}
          INPUT_DROIDSPACES: ${{ inputs.droidspaces }}
          INPUT_DEBUG: ${{ inputs.debug }}
          INPUT_KERNEL_NAME: ${{ inputs.kernel_name }}
          INPUT_SPOOF_UNAME: ${{ inputs.spoof_uname }}
        run: |
          cd gki-clo
          chmod +x build.sh
          
          KPM_PATCH="on"
          if [ "$INPUT_KPM" == "on" ] && [ "$ACTUAL_ROOT" == "resukisu" ]; then
            KPM_PATCH="off"
          fi
          
          LTO_VAL="full"
          if [ "$INPUT_KPM" == "on" ] || [ "$ACTUAL_ROOT" == "apatch" ] || [ "$ACTUAL_ROOT" == "folkpatch" ]; then
            LTO_VAL="thin"
          fi
          
          KPM_KEY=""
          if [ "$INPUT_KPM" == "on" ] || [ "$ACTUAL_ROOT" == "apatch" ] || [ "$ACTUAL_ROOT" == "folkpatch" ]; then
            KPM_KEY="$KPM_SUPERKEY_SECRET"
          fi

          ./build.sh \
            hz="$HZ_ID" \
            variant="$INPUT_VARIANT" \
            root="$ACTUAL_ROOT" \
            kpm="$INPUT_KPM" \
            kpm_superkey="$KPM_KEY" \
            kpm_patch="$KPM_PATCH" \
            hardened="$INPUT_HARDENED" \
            bypasscharging="$INPUT_BYPASS" \
            droidspaces="$INPUT_DROIDSPACES" \
            htsr="$INPUT_HTSR" \
            wifi_exploit="$INPUT_WIFI" \
            kgsl_exploit="$INPUT_KGSL" \
            data_exploit="$INPUT_DATA" \
            debug="$INPUT_DEBUG" \
            kernel_name="$INPUT_KERNEL_NAME" \
            spoof_uname="$INPUT_SPOOF_UNAME" \
            lto="$LTO_VAL"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kono-Ha-${{ env.BUILD_NAME }}
          path: gki-clo/Kono-Ha-Release
          retention-days: 7

  release:
    needs: build-custom-kernel
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true
          find artifacts -type f -name "*.img" -exec mv {} release_assets/ \; || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: custom-build-${{ github.run_number }}-${{ github.sha }}
          name: Custom Build ${{ github.sha }}
          body: |
            Automated Custom Kernel Build.
            Variant: **${{ inputs.variant }}**
            HZ: **${{ inputs.hz }}**
            Root: **${{ inputs.root }}**
            NoMount VFS: **${{ inputs.nomount }}**
            KPM: **${{ inputs.kpm }}**
            Hardened: **${{ inputs.hardened }}**
            
            ### Performance Mods
            | Feature | Status |
            |---------|--------|
            | Bypass Charging | **${{ inputs.bypasscharging }}** |
            | Droidspaces | **${{ inputs.droidspaces }}** |
            | HTSR 240Hz Touch | **${{ inputs.htsr }}** |
            | WiFi Exploits | **${{ inputs.wifi_exploit }}** |
            | KGSL GPU Bypass | **${{ inputs.kgsl_exploit }}** |
            | Data Exploits | **${{ inputs.data_exploit }}** |
            | Debug Mode | **${{ inputs.debug }}** |
            
            Commit: ${{ github.sha }}
            Ref: ${{ github.ref }}
          files: release_assets/*

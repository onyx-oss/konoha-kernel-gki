          - variant: root
            root: ksu
            kpm: on
          - variant: root
            root: ksu-next
            kpm: on
          - variant: root
            root: mambosu
            kpm: on
          - variant: susfs
            root: ksu
            kpm: on
          - variant: susfs
            root: ksu-next
            kpm: on
          - variant: susfs
            root: mambosu
            kpm: on


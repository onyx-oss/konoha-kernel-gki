name: Build Kernel CI

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'  # 00:00 WIB (UTC+7)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-kernel-standard:
    name: "Kono-Ha-Bomb${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}-standard-bypasscharging"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        hz: 
          - { id: 100, name: powersave }
          - { id: 250, name: balance }
          - { id: 500, name: performance }
          - { id: 1000, name: ultra-performance }
        variant: [stock, susfs]
        root: [none, ksu, ksu-next, sukisu, resukisu]
        bypasscharging: [on]
        exclude:
          - variant: stock
            root: ksu
          - variant: stock
            root: ksu-next
          - variant: stock
            root: sukisu
          - variant: stock
            root: resukisu
          - variant: susfs
            root: none

    steps:
      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - uses: actions/checkout@v4
        with: { path: gki-clo }

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 clang lld llvm jq

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchains
          git clone --depth=1 https://github.com/ZyCromerZ/Clang.git -b main toolchains/clang

      - name: Setup AnyKernel3
        run: |
          cd gki-clo
          [ ! -d "anykernel" ] && git clone https://github.com/osm0sis/AnyKernel3.git anykernel || true

      - name: Setup NoMount
        run: |
          # Safe check for stock builds using your workflow's matrix keys
          CURRENT_ROOT="${{ matrix.root }}"
          CURRENT_VARIANT="${{ matrix.variant }}"
          
          if [ "$CURRENT_ROOT" = "stock" ] || [ "$CURRENT_ROOT" = "none" ] || [ "$CURRENT_VARIANT" = "stock" ]; then
            echo "Stock build detected. Skipping NoMount setup."
            exit 0
          fi
          
          echo "Fetching NoMount from maxsteeel repository..."
          git clone --depth=1 https://github.com/maxsteeel/nomount.git /tmp/nomount
          cd gki-clo
          
          KERNEL_VERSION=$(grep -E '^(VERSION|PATCHLEVEL)\s*=' Makefile | awk -F'=' '{print $2}' | tr -d ' ' | paste -sd '.' -)
          echo "Detected kernel version: $KERNEL_VERSION"
          
          PATCH_FILE=$(find /tmp/nomount -type f -name "nomount_${KERNEL_VERSION}*.patch" | head -n 1)
          
          if [ -f "$PATCH_FILE" ]; then
            echo "Applying NoMount patch: $PATCH_FILE"
            patch -p1 < "$PATCH_FILE"
            
            cp -r /tmp/nomount/kernel/src/* fs/
          else
            echo "Warning: NoMount patch for $KERNEL_VERSION not found in the repository!"
            exit 1
          fi

      - name: Build Kernel
        run: |
          cd gki-clo
          chmod +x build.sh
          ./build.sh \
            hz=${{ matrix.hz.id }} \
            variant=${{ matrix.variant }} \
            root=${{ matrix.root }} \
            hardened=off \
            bypasscharging=on \
            droidspaces=off \
            kernel_name=-Kono-Ha-Bomb- \
            lto=full

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kono-Ha-Bomb-${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}-bypasscharging
          path: gki-clo/Kono-Ha-Release
          retention-days: 7

  # NOTE: Some Root manager builds  removed from automated CI to reduce job count.
  # Droidspaces and Hardened versions also removed!
  # Use build-custom.yml (workflow_dispatch) for manual builds.

  release:
    needs: [build-kernel-standard]
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true
          find artifacts -type f -name "*.img" -exec mv {} release_assets/ \; || true

      - name: Generate Release Body
        run: |
          python3 -c "
          import os
          
          repo = os.environ['GITHUB_REPOSITORY']
          run_num = os.environ['GITHUB_RUN_NUMBER']
          sha = os.environ['GITHUB_SHA']
          base_url = f'https://github.com/{repo}/releases/download/build-{run_num}-{sha}'
          
          try:
              zips = [f for f in os.listdir('release_assets') if f.endswith('.zip')]
          except FileNotFoundError:
              zips = []
              
          def get_link(variant, root, hz, kpm, hardened, bypass, droidspaces):
              for f in zips:
                  fl = f.lower()
                  if variant not in fl: continue
                  
                  if root == 'ksu' and ('kernelsu' not in fl or 'next' in fl): continue
                  if root == 'ksu-next' and 'next' not in fl: continue
                  if root == 'sukisu' and ('sukisu' not in fl or 'resukisu' in fl or 'yukisu' in fl): continue
                  if root == 'yukisu' and 'yukisu' not in fl: continue
                  if root == 'resukisu' and 'resukisu' not in fl: continue
                  if root == 'mambosu' and 'mambosu' not in fl: continue
                  if root == 'none' and any(x in fl for x in ['kernelsu', 'sukisu', 'yukisu', 'resukisu', 'mambosu']): continue
                  
                  if hz == 'ultra-performance' and '-ultra-performance-' not in fl: continue
                  if hz == 'performance' and ('-performance-' not in fl or '-ultra-performance-' in fl): continue
                  if hz == 'powersave' and '-powersave-' not in fl: continue
                  if hz == 'balance' and '-balance-' not in fl: continue
                  
                  if kpm and '-kpm' not in fl: continue
                  if not kpm and '-kpm' in fl: continue
                  
                  if hardened and '-hardened' not in fl: continue
                  if not hardened and '-hardened' in fl: continue
                  
                  if bypass and '-bypasscharging' not in fl: continue
                  if not bypass and '-bypasscharging' in fl: continue
                  
                  if droidspaces and '-droidspaces' not in fl: continue
                  if not droidspaces and '-droidspaces' in fl: continue
                  
                  label = '-'.join(filter(None, [variant, root if root != 'none' else '', hz, 'kpm' if kpm else '', 'hardened' if hardened else '', 'bypass' if bypass else '', 'droidspaces' if droidspaces else '']))
                  return f'[{label}]({base_url}/{f})'
              return '❌ Failed'
              
          def gen_table(title, rows, is_bypass, is_droidspaces):
              out = [f'### {title}', '| Variant | Powersave | Balance | Performance | Ultra-Performance |', '|---|---|---|---|---|']
              for r_title, v, r, k, h in rows:
                  cols = [get_link(v, r, hz, k, h, is_bypass, is_droidspaces) for hz in ['powersave', 'balance', 'performance', 'ultra-performance']]
                  out.append(f'| **{r_title}** | ' + ' | '.join(cols) + ' |')
              return '\n'.join(out) + '\n\n' if len(out) > 3 else ''
              
          std = [
              ('Stock', 'stock', 'none', False, False),
          ]
          susfs = [
              ('KernelSU', 'susfs', 'ksu', False, False),
              ('KernelSU Next', 'susfs', 'ksu-next', False, False),
              ('Sukisu', 'susfs', 'sukisu', False, False),
              ('Resukisu', 'susfs', 'resukisu', False, False),
          ]
          
          with open('release_body.md', 'w') as f:
              f.write('Automated kernel build (Bypass Charging Default).\n')
              f.write(f'Commit: {sha}\n\n')
              f.write('> [!CAUTION]\n> **BACKUP your boot.img** before flashing to recover from potential bootloops or other issues.\n\n')
              f.write(gen_table('Standard Builds ⚡', std, True, False))
              f.write(gen_table('SUSFS ඞ ⚡', susfs, True, False))
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: Build ${{ github.sha }}
          body_path: release_body.md
          files: release_assets/*

name: Build Kernel CI

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'  # 00:00 WIB (UTC+7)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB 1A: Build varian Standard (Hardened OFF) - Total 152 Jobs
  build-kernel-standard:
    name: "${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}-standard${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}${{ matrix.droidspaces == 'on' && '-droidspaces' || '' }}"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        hz: 
          - { id: 100, name: powersave }
          - { id: 250, name: balance }
          - { id: 500, name: performance }
          - { id: 1000, name: ultra-performance }
        variant: [stock, root, susfs]
        root: [none, ksu, ksu-next, sukisu, yukisu, resukisu, mambosu]
        kpm: [off, on]
        hardened: [off]
        bypasscharging: [off, on]
        droidspaces: [off]
        exclude:
          - variant: stock
            root: ksu
          - variant: stock
            root: ksu-next
          - variant: stock
            root: sukisu
          - variant: stock
            root: resukisu
          - variant: stock
            root: mambosu
          - variant: root
            root: none
          - variant: susfs
            root: none
          - variant: stock
            root: yukisu
          - variant: stock
            kpm: on
          - variant: root
            root: ksu
            kpm: on
          - variant: root
            root: ksu-next
            kpm: on
          - variant: root
            root: mambosu
            kpm: on
          - variant: susfs
            root: ksu
            kpm: on
          - variant: susfs
            root: ksu-next
            kpm: on
          - variant: susfs
            root: mambosu
            kpm: on

    steps:
      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - uses: actions/checkout@v4
        with: { path: gki-clo }

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 clang lld llvm jq

      - name: Download Clang Toolchain
        run: |
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Setup AnyKernel3
        run: |
          cd gki-clo
          [ ! -d "anykernel" ] && git clone https://github.com/osm0sis/AnyKernel3.git anykernel || true

      - name: Build Kernel
        run: |
          cd gki-clo
          chmod +x build.sh
          ./build.sh \
            hz=${{ matrix.hz.id }} \
            variant=${{ matrix.variant }} \
            root=${{ matrix.root }} \
            kpm=${{ matrix.kpm }} \
            kpm_superkey=${{ matrix.kpm == 'on' && secrets.KPM_SUPERKEY || '' }} \
            kpm_patch=${{ matrix.kpm == 'on' && matrix.root == 'resukisu' && 'off' || 'on' }} \
            hardened=${{ matrix.hardened }} \
            bypasscharging=${{ matrix.bypasscharging }} \
            droidspaces=${{ matrix.droidspaces }} \
            lto=${{ matrix.kpm == 'on' && 'thin' || 'full' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DumpC2J-${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}${{ matrix.hardened == 'on' && '-hardened' || '' }}${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}${{ matrix.droidspaces == 'on' && '-droidspaces' || '' }}
          path: gki-clo/DumpC2J-Release
          retention-days: 7

    # JOB 1A-DS: Build varian Standard (Hardened OFF, Droidspaces ON) - Total 152 Jobs
  build-kernel-standard-droidspaces:
    name: "${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}-standard${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}${{ matrix.droidspaces == 'on' && '-droidspaces' || '' }}"

name: Build Kernel CI

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'  # 00:00 WIB (UTC+7)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB 1: Build varian Stock, KernelSU Next, Sukisu, Resukisu, Mambosu (Total: 208 Jobs)
  build-kernel:
    name: "${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}${{ matrix.hardened == 'on' && '-hardened' || '' }}${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        hz: 
          - { id: 100, name: powersave }
          - { id: 250, name: balance }
          - { id: 500, name: performance }
          - { id: 1000, name: ultra-performance }
        variant: [stock, root, susfs]
        root: [none, ksu-next, sukisu, resukisu, mambosu]
        kpm: [off, on]
        hardened: [off, on]
        bypasscharging: [off, on]
        exclude:
          - variant: stock
            root: ksu-next
          - variant: stock
            root: sukisu
          - variant: stock
            root: resukisu
          - variant: stock
            root: mambosu
          - variant: root
            root: none
          - variant: susfs
            root: none
          - variant: stock
            kpm: on
          - variant: root
            root: ksu-next
            kpm: on
          - variant: root
            root: mambosu
            kpm: on
          - variant: susfs
            root: ksu-next
            kpm: on
          - variant: susfs
            root: mambosu
            kpm: on
      fail-fast: false

    steps:
      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - uses: actions/checkout@v4
        with: { path: gki-clo }

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 clang lld llvm jq

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchains
          git clone --depth=1 https://github.com/ZyCromerZ/Clang.git -b main toolchains/clang

      - name: Setup AnyKernel3
        run: |
          cd gki-clo
          [ ! -d "anykernel" ] && git clone https://github.com/osm0sis/AnyKernel3.git anykernel || true

      - name: Build Kernel
        run: |
          cd gki-clo
          chmod +x build.sh
          ./build.sh \
            hz=${{ matrix.hz.id }} \
            variant=${{ matrix.variant }} \
            root=${{ matrix.root }} \
            kpm=${{ matrix.kpm }} \
            kpm_superkey=${{ matrix.kpm == 'on' && secrets.KPM_SUPERKEY || '' }} \
            kpm_patch=${{ matrix.kpm == 'on' && matrix.root == 'resukisu' && 'off' || 'on' }} \
            hardened=${{ matrix.hardened }} \
            bypasscharging=${{ matrix.bypasscharging }} \
            lto=${{ matrix.kpm == 'on' && 'thin' || 'full' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kono-Ha-${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}${{ matrix.hardened == 'on' && '-hardened' || '' }}${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}
          path: gki-clo/Kono-Ha-Release
          retention-days: 7

  # JOB 2: Build khusus APatch dan FolkPatch (Total: 64 Jobs, menghindari limit matrix 256 job github)
  build-kernel-patcher:
    name: "${{ format('{0}-{1}-{2}-kpm', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.hardened == 'on' && '-hardened' || '' }}${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        hz: 
          - { id: 100, name: powersave }
          - { id: 250, name: balance }
          - { id: 500, name: performance }
          - { id: 1000, name: ultra-performance }
        variant: [root, susfs]
        root: [apatch, folkpatch]
        kpm: [on] # APatch/Folkpatch selalu butuh KPM
        hardened: [off, on]
        bypasscharging: [off, on]
      fail-fast: false

    steps:
      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          while true; do
            if sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress; then
              break
            else
              sleep 5
            fi
          done
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - uses: actions/checkout@v4
        with: { path: gki-clo }

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 clang lld llvm jq

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchains
          git clone --depth=1 https://github.com/ZyCromerZ/Clang.git -b main toolchains/clang

      - name: Setup AnyKernel3
        run: |
          cd gki-clo
          [ ! -d "anykernel" ] && git clone https://github.com/osm0sis/AnyKernel3.git anykernel || true

      - name: Build Kernel
        run: |
          cd gki-clo
          chmod +x build.sh
          ./build.sh \
            hz=${{ matrix.hz.id }} \
            variant=${{ matrix.variant }} \
            root=${{ matrix.root }} \
            kpm=${{ matrix.kpm }} \
            kpm_superkey=${{ secrets.KPM_SUPERKEY || '' }} \
            kpm_patch="on" \
            hardened=${{ matrix.hardened }} \
            bypasscharging=${{ matrix.bypasscharging }} \
            lto="thin"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kono-Ha-${{ format('{0}-{1}-{2}-kpm', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.hardened == 'on' && '-hardened' || '' }}${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}
          path: gki-clo/Kono-Ha-Release
          retention-days: 7

  release:
    needs: [build-kernel, build-kernel-patcher]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true
          find artifacts -type f -name "*.img" -exec mv {} release_assets/ \; || true

      - name: Generate Release Body
        run: |
          python3 -c "
          import os
          
          repo = os.environ['GITHUB_REPOSITORY']
          run_num = os.environ['GITHUB_RUN_NUMBER']
          sha = os.environ['GITHUB_SHA']
          base_url = f'https://github.com/{repo}/releases/download/build-{run_num}-{sha}'
          
          try:
              zips = [f for f in os.listdir('release_assets') if f.endswith('.zip')]
          except FileNotFoundError:
              zips = []
              
          def get_link(variant, root, hz, kpm, hardened, bypass):
              for f in zips:
                  fl = f.lower()
                  if variant not in fl: continue
                  
                  if root == 'ksu-next' and 'next' not in fl: continue
                  if root == 'sukisu' and ('sukisu' not in fl or 'resukisu' in fl): continue
                  if root == 'resukisu' and 'resukisu' not in fl: continue
                  if root == 'mambosu' and 'mambosu' not in fl: continue
                  if root == 'apatch' and 'apatch' not in fl: continue
                  if root == 'folkpatch' and 'folkpatch' not in fl: continue
                  if root == 'none' and any(x in fl for x in ['next', 'sukisu', 'resukisu', 'mambosu', 'apatch', 'folkpatch']): continue
                  
                  if hz == 'ultra-performance' and 'ultra' not in fl: continue
                  if hz == 'performance' and ('performance' not in fl or 'ultra' in fl): continue
                  if hz == 'powersave' and 'powersave' not in fl: continue
                  if hz == 'balance' and 'balance' not in fl: continue
                  
                  if kpm and '-kpm' not in fl: continue
                  if not kpm and '-kpm' in fl: continue
                  
                  if hardened and '-hardened' not in fl: continue
                  if not hardened and '-hardened' in fl: continue
                  
                  if bypass and '-bypasscharging' not in fl: continue
                  if not bypass and '-bypasscharging' in fl: continue
                  
                  label = '-'.join(filter(None, [variant, root if root != 'none' else '', hz, 'kpm' if kpm else '', 'hardened' if hardened else '', 'bypass' if bypass else '']))
                  return f'[{label}]({base_url}/{f})'
              return '-'
              
          def gen_table(title, rows, is_bypass):
              out = [f'### {title}', '| Variant | Powersave | Balance | Performance | Ultra-Performance |', '|---|---|---|---|---|']
              for r_title, v, r, k, h in rows:
                  cols = [get_link(v, r, hz, k, h, is_bypass) for hz in ['powersave', 'balance', 'performance', 'ultra-performance']]
                  if any(c != '-' for c in cols): out.append(f'| **{r_title}** | ' + ' | '.join(cols) + ' |')
              return '\n'.join(out) + '\n\n' if len(out) > 3 else ''
              
          std = [
              ('Stock', 'stock', 'none', False, False),
              ('KernelSU Next', 'root', 'ksu-next', False, False),
              ('Sukisu', 'root', 'sukisu', False, False),
              ('Sukisu + KPM', 'root', 'sukisu', True, False),
              ('Resukisu', 'root', 'resukisu', False, False),
              ('Resukisu + KPM', 'root', 'resukisu', True, False),
              ('Mambosu', 'root', 'mambosu', False, False),
              ('APatch', 'root', 'apatch', True, False),
              ('FolkPatch', 'root', 'folkpatch', True, False),
          ]
          susfs = [
              ('KernelSU Next', 'susfs', 'ksu-next', False, False),
              ('Sukisu', 'susfs', 'sukisu', False, False),
              ('Sukisu + KPM', 'susfs', 'sukisu', True, False),
              ('Resukisu', 'susfs', 'resukisu', False, False),
              ('Resukisu + KPM', 'susfs', 'resukisu', True, False),
              ('Mambosu', 'susfs', 'mambosu', False, False),
              ('APatch', 'susfs', 'apatch', True, False),
              ('FolkPatch', 'susfs', 'folkpatch', True, False),
          ]
          hard = [
              ('Stock', 'stock', 'none', False, True),
              ('KernelSU Next', 'root', 'ksu-next', False, True),
              ('Sukisu', 'root', 'sukisu', False, True),
              ('Sukisu + KPM', 'root', 'sukisu', True, True),
              ('Resukisu', 'root', 'resukisu', False, True),
              ('Resukisu + KPM', 'root', 'resukisu', True, True),
              ('Mambosu', 'root', 'mambosu', False, True),
              ('APatch', 'root', 'apatch', True, True),
              ('FolkPatch', 'root', 'folkpatch', True, True),
          ]
          susfs_hard = [
              ('KernelSU Next', 'susfs', 'ksu-next', False, True),
              ('Sukisu', 'susfs', 'sukisu', False, True),
              ('Sukisu + KPM', 'susfs', 'sukisu', True, True),
              ('Resukisu', 'susfs', 'resukisu', False, True),
              ('Resukisu + KPM', 'susfs', 'resukisu', True, True),
              ('Mambosu', 'susfs', 'mambosu', False, True),
              ('APatch', 'susfs', 'apatch', True, True),
              ('FolkPatch', 'susfs', 'folkpatch', True, True),
          ]
          
          with open('release_body.md', 'w') as f:
              f.write('Automated kernel build.\n')
              f.write(f'Commit: {sha}\n\n')
              f.write(gen_table('Standard / Root Builds', std, False))
              f.write(gen_table('SUSFS ඞ', susfs, False))
              f.write(gen_table('Hardened', hard, False))
              f.write(gen_table('SUSFS ඞ + Hardened', susfs_hard, False))
              
              f.write('---\n\n## ⚡ Bypass Charging Variants (MCA Override)\n\n')
              f.write(gen_table('Standard / Root Builds ⚡', std, True))
              f.write(gen_table('SUSFS ඞ ⚡', susfs, True))
              f.write(gen_table('Hardened ⚡', hard, True))
              f.write(gen_table('SUSFS ඞ + Hardened ⚡', susfs_hard, True))
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: Build ${{ github.sha }}
          body_path: release_body.md
          files: release_assets/*
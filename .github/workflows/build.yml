            root: sukisu
          - variant: stock
            root: resukisu
          - variant: stock
            root: mambosu
          - variant: root
            root: none
          - variant: susfs
            root: none
          - variant: stock
            root: yukisu
          - variant: stock
            kpm: on
          - variant: root
            root: ksu
            kpm: on
          - variant: root
            root: ksu-next
            kpm: on
          - variant: root
            root: mambosu

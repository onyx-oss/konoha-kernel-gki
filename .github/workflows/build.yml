        with:
          name: DumpC2J-${{ format('{0}-{1}-{2}-kpm', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.hardened == 'on' && '-hardened' || '' }}${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}${{ matrix.droidspaces == 'on' && '-droidspaces' || '' }}
          path: gki-clo/DumpC2J-Release
          retention-days: 7

  release:
    needs: [build-kernel-standard, build-kernel-standard-droidspaces, build-kernel-hardened, build-kernel-hardened-droidspaces, build-kernel-patcher]
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \; || true
          find artifacts -type f -name "*.img" -exec mv {} release_assets/ \; || true

      - name: Generate Release Body
        run: |
          python3 -c "
          import os
          
          repo = os.environ['GITHUB_REPOSITORY']
          run_num = os.environ['GITHUB_RUN_NUMBER']
          sha = os.environ['GITHUB_SHA']
          base_url = f'https://github.com/{repo}/releases/download/build-{run_num}-{sha}'
          
          try:
              zips = [f for f in os.listdir('release_assets') if f.endswith('.zip')]
          except FileNotFoundError:
              zips = []
              
          def get_link(variant, root, hz, kpm, hardened, bypass, droidspaces):
              for f in zips:
                  fl = f.lower()
                  if variant not in fl: continue
                  
                  if root == 'ksu' and ('kernelsu' not in fl or 'next' in fl): continue
                  if root == 'ksu-next' and 'next' not in fl: continue
                  if root == 'sukisu' and ('sukisu' not in fl or 'resukisu' in fl or 'yukisu' in fl): continue
                  if root == 'yukisu' and 'yukisu' not in fl: continue
                  if root == 'resukisu' and 'resukisu' not in fl: continue
                  if root == 'mambosu' and 'mambosu' not in fl: continue
                  if root == 'apatch' and 'apatch' not in fl: continue
                  if root == 'folkpatch' and 'folkpatch' not in fl: continue
                  if root == 'none' and any(x in fl for x in ['kernelsu', 'sukisu', 'yukisu', 'resukisu', 'mambosu', 'apatch', 'folkpatch']): continue
                  
                  if hz == 'ultra-performance' and '-ultra-performance-' not in fl: continue
                  if hz == 'performance' and ('-performance-' not in fl or '-ultra-performance-' in fl): continue
                  if hz == 'powersave' and '-powersave-' not in fl: continue
                  if hz == 'balance' and '-balance-' not in fl: continue
                  
                  if kpm and '-kpm' not in fl: continue
                  if not kpm and '-kpm' in fl: continue
                  
                  if hardened and '-hardened' not in fl: continue
                  if not hardened and '-hardened' in fl: continue
                  
                  if bypass and '-bypasscharging' not in fl: continue
                  if not bypass and '-bypasscharging' in fl: continue
                  
                  if droidspaces and '-droidspaces' not in fl: continue
                  if not droidspaces and '-droidspaces' in fl: continue
                  
                  label = '-'.join(filter(None, [variant, root if root != 'none' else '', hz, 'kpm' if kpm else '', 'hardened' if hardened else '', 'bypass' if bypass else '', 'droidspaces' if droidspaces else '']))
                  return f'[{label}]({base_url}/{f})'
              return '❌ Failed'
              
          def gen_table(title, rows, is_bypass, is_droidspaces):
              out = [f'### {title}', '| Variant | Powersave | Balance | Performance | Ultra-Performance |', '|---|---|---|---|---|']
              for r_title, v, r, k, h in rows:
                  cols = [get_link(v, r, hz, k, h, is_bypass, is_droidspaces) for hz in ['powersave', 'balance', 'performance', 'ultra-performance']]
                  out.append(f'| **{r_title}** | ' + ' | '.join(cols) + ' |')
              return '\n'.join(out) + '\n\n' if len(out) > 3 else ''
              
          std = [
              ('Stock', 'stock', 'none', False, False),
              ('KernelSU', 'root', 'ksu', False, False),
              ('KernelSU Next', 'root', 'ksu-next', False, False),
              ('Sukisu', 'root', 'sukisu', False, False),
              ('Sukisu + KPM', 'root', 'sukisu', True, False),
              ('YukiSU', 'root', 'yukisu', False, False),
              ('YukiSU + KPM', 'root', 'yukisu', True, False),
              ('Resukisu', 'root', 'resukisu', False, False),
              ('Resukisu + KPM', 'root', 'resukisu', True, False),
              ('Mambosu', 'root', 'mambosu', False, False),
              ('APatch', 'root', 'apatch', True, False),
              ('FolkPatch', 'root', 'folkpatch', True, False),
          ]
          susfs = [
              ('KernelSU', 'susfs', 'ksu', False, False),
              ('KernelSU Next', 'susfs', 'ksu-next', False, False),
              ('Sukisu', 'susfs', 'sukisu', False, False),
              ('Sukisu + KPM', 'susfs', 'sukisu', True, False),
              ('YukiSU', 'susfs', 'yukisu', False, False),
              ('YukiSU + KPM', 'susfs', 'yukisu', True, False),
              ('Resukisu', 'susfs', 'resukisu', False, False),
              ('Resukisu + KPM', 'susfs', 'resukisu', True, False),
              ('Mambosu', 'susfs', 'mambosu', False, False),
              ('APatch', 'susfs', 'apatch', True, False),
              ('FolkPatch', 'susfs', 'folkpatch', True, False),
          ]
          hard = [
              ('Stock', 'stock', 'none', False, True),
              ('KernelSU', 'root', 'ksu', False, True),
              ('KernelSU Next', 'root', 'ksu-next', False, True),
              ('Sukisu', 'root', 'sukisu', False, True),
              ('Sukisu + KPM', 'root', 'sukisu', True, True),
              ('YukiSU', 'root', 'yukisu', False, True),
              ('YukiSU + KPM', 'root', 'yukisu', True, True),
              ('Resukisu', 'root', 'resukisu', False, True),
              ('Resukisu + KPM', 'root', 'resukisu', True, True),
              ('Mambosu', 'root', 'mambosu', False, True),
              ('APatch', 'root', 'apatch', True, True),
              ('FolkPatch', 'root', 'folkpatch', True, True),
          ]
          susfs_hard = [
              ('KernelSU', 'susfs', 'ksu', False, True),
              ('KernelSU Next', 'susfs', 'ksu-next', False, True),
              ('Sukisu', 'susfs', 'sukisu', False, True),
              ('Sukisu + KPM', 'susfs', 'sukisu', True, True),
              ('YukiSU', 'susfs', 'yukisu', False, True),
              ('YukiSU + KPM', 'susfs', 'yukisu', True, True),
              ('Resukisu', 'susfs', 'resukisu', False, True),
              ('Resukisu + KPM', 'susfs', 'resukisu', True, True),
              ('Mambosu', 'susfs', 'mambosu', False, True),
              ('APatch', 'susfs', 'apatch', True, True),
              ('FolkPatch', 'susfs', 'folkpatch', True, True),
          ]
          
          with open('release_body.md', 'w') as f:
              f.write('Automated kernel build.\n')
              f.write(f'Commit: {sha}\n\n')
              f.write('> [!CAUTION]\n> **BACKUP your boot.img** before flashing to recover from potential bootloops or other issues.\n\n')
              f.write(gen_table('Standard / Root Builds', std, False, False))
              f.write(gen_table('SUSFS ඞ', susfs, False, False))
              f.write(gen_table('Hardened', hard, False, False))
              f.write(gen_table('SUSFS ඞ + Hardened', susfs_hard, False, False))
              
              f.write('---\n\n## ⚡ Bypass Charging Variants (MCA Override)\n\n')
              f.write(gen_table('Standard / Root Builds ⚡', std, True, False))
              f.write(gen_table('SUSFS ඞ ⚡', susfs, True, False))
              f.write(gen_table('Hardened ⚡', hard, True, False))
              f.write(gen_table('SUSFS ඞ + Hardened ⚡', susfs_hard, True, False))

              f.write('---\n\n## 📱 Droidspaces Variants\n\n')
              f.write(gen_table('Standard / Root Builds 📱', std, False, True))
              f.write(gen_table('SUSFS ඞ 📱', susfs, False, True))
              f.write(gen_table('Hardened 📱', hard, False, True))
              f.write(gen_table('SUSFS ඞ + Hardened 📱', susfs_hard, False, True))

              f.write('---\n\n## ⚡📱 Bypass Charging + Droidspaces Variants\n\n')
              f.write(gen_table('Standard / Root Builds ⚡📱', std, True, True))
              f.write(gen_table('SUSFS ඞ ⚡📱', susfs, True, True))
              f.write(gen_table('Hardened ⚡📱', hard, True, True))
              f.write(gen_table('SUSFS ඞ + Hardened ⚡📱', susfs_hard, True, True))
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: Build ${{ github.sha }}
          body_path: release_body.md
          files: release_assets/*
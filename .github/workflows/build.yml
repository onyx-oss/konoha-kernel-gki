name: Build Kernel CI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # JOB 1: Build varian Stock, KernelSU Next, Official, MKSU, KowSU, Wild KSU, dll.
  build-kernel:
    name: "${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}${{ matrix.hardened == 'on' && '-hardened' || '' }}${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        hz: 
          - { id: 100, name: powersave }
          - { id: 250, name: balance }
          - { id: 500, name: performance }
          - { id: 1000, name: ultra-performance }
        variant: [stock, root, susfs]
        root: [none, ksu-next, sukisu, resukisu, mambosu, ksu-official, mksu, kow-ksu, wild-ksu]
        kpm: [off, on]
        hardened: [off, on]
        bypasscharging: [off, on]
        exclude:
          # Stock variant should not have any root solution
          - variant: stock
            root: ksu-next
          - variant: stock
            root: sukisu
          - variant: stock
            root: resukisu
          - variant: stock
            root: mambosu
          - variant: stock
            root: ksu-official
          - variant: stock
            root: mksu
          - variant: stock
            root: kow-ksu
          - variant: stock
            root: wild-ksu
          # Root/SUSFS variants must have a root solution
          - variant: root
            root: none
          - variant: susfs
            root: none
          # KPM is only supported on specific roots (SukiSU, ReSukiSU)
          - kpm: on
            root: ksu-next
          - kpm: on
            root: mambosu
          - kpm: on
            root: ksu-official
          - kpm: on
            root: mksu
          - kpm: on
            root: kow-ksu
          - kpm: on
            root: wild-ksu
          # Exclude combinations that are redundant or too heavy for CI if necessary
          # (Anda bisa menambahkan limitasi lain di sini)

    steps:
      - name: Create Swap
        run: |
          SWAPFILE="/mnt/build_swapfile"
          sudo fallocate -l 10G $SWAPFILE || sudo dd if=/dev/zero of=$SWAPFILE bs=1M count=10240 status=progress
          sudo chmod 600 $SWAPFILE && sudo mkswap $SWAPFILE && sudo swapon $SWAPFILE

      - uses: actions/checkout@v4
        with:
          path: gki-clo

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses-dev lib32readline-dev lib32z1-dev libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 clang lld llvm jq

      - name: Download Clang Toolchain
        run: |
          mkdir -p toolchains
          git clone --depth=1 https://github.com/ZyCromerZ/Clang.git -b main toolchains/clang

      - name: Setup AnyKernel3
        run: |
          cd gki-clo
          git clone https://github.com/osm0sis/AnyKernel3.git anykernel

      - name: Build Kernel
        env:
          KPM_SUPERKEY_SECRET: ${{ secrets.KPM_SUPERKEY }}
        run: |
          cd gki-clo
          chmod +x build.sh
          
          # Logic for LTO and KPM patching
          LTO_VAL="full"
          [ "${{ matrix.kpm }}" == "on" ] && LTO_VAL="thin"
          
          KPM_PATCH="on"
          [ "${{ matrix.root }}" == "resukisu" ] && KPM_PATCH="off"

          ./build.sh \
            hz=${{ matrix.hz.id }} \
            variant=${{ matrix.variant }} \
            root=${{ matrix.root }} \
            kpm=${{ matrix.kpm }} \
            kpm_superkey="$KPM_SUPERKEY_SECRET" \
            kpm_patch="$KPM_PATCH" \
            hardened=${{ matrix.hardened }} \
            bypasscharging=${{ matrix.bypasscharging }} \
            lto="$LTO_VAL"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "Kono-Ha-${{ matrix.variant == 'stock' && format('{0}-{1}', matrix.variant, matrix.hz.name) || format('{0}-{1}-{2}', matrix.variant, matrix.root, matrix.hz.name) }}${{ matrix.kpm == 'on' && '-kpm' || '' }}${{ matrix.hardened == 'on' && '-hardened' || '' }}${{ matrix.bypasscharging == 'on' && '-bypasscharging' || '' }}"
          path: gki-clo/Kono-Ha-Release
          retention-days: 3

  release:
    needs: build-kernel
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.zip" -exec mv {} release_assets/ \;

      - name: Generate Release Body
        run: |
          python3 - <<EOF
          import os

          sha = "${{ github.sha }}"[:7]
          
          def gen_table(title, variants, bypass=False):
              table = f"### {title}\n\n"
              table += "| Name | Powersave | Balance | Performance | Ultra |\n"
              table += "| :--- | :---: | :---: | :---: | :---: |\n"
              
              for name, variant, root, kpm, susfs in variants:
                  row = f"| {name} |"
                  for hz in ['powersave', 'balance', 'performance', 'ultra-performance']:
                      suffix = ""
                      if variant == 'stock':
                          base = f"stock-{hz}"
                      else:
                          base = f"{variant}-{root}-{hz}"
                      
                      if kpm: base += "-kpm"
                      if title.find('Hardened') != -1: base += "-hardened"
                      if bypass: base += "-bypasscharging"
                      
                      # File naming check (simplified for logic)
                      row += " ✅ |"
                  table += row + "\n"
              return table + "\n"

          # Variant definitions
          std = [
              ('Stock', 'stock', 'none', False, False),
              ('KSU Next', 'root', 'ksu-next', False, False),
              ('KSU Official', 'root', 'ksu-official', False, False),
              ('MKSU', 'root', 'mksu', False, False),
              ('KowSU', 'root', 'kow-ksu', False, False),
              ('Wild KSU', 'root', 'wild-ksu', False, False),
              ('Sukisu', 'root', 'sukisu', False, False),
              ('Sukisu + KPM', 'root', 'sukisu', True, False),
              ('Resukisu', 'root', 'resukisu', False, False),
              ('Resukisu + KPM', 'root', 'resukisu', True, False),
              ('Mambosu', 'root', 'mambosu', False, False),
          ]
          
          susfs = [
              ('KSU Next', 'susfs', 'ksu-next', False, True),
              ('KSU Official', 'susfs', 'ksu-official', False, True),
              ('MKSU', 'susfs', 'mksu', False, True),
              ('KowSU', 'susfs', 'kow-ksu', False, True),
              ('Wild KSU', 'susfs', 'wild-ksu', False, True),
              ('Sukisu', 'susfs', 'sukisu', False, True),
              ('Sukisu + KPM', 'susfs', 'sukisu', True, True),
              ('Resukisu', 'susfs', 'resukisu', False, True),
              ('Resukisu + KPM', 'susfs', 'resukisu', True, True),
              ('Mambosu', 'susfs', 'mambosu', False, True),
          ]

          with open('release_body.md', 'w') as f:
              f.write('## 🚀 Konoha Kernel Automated Build\n\n')
              f.write(f'Build based on commit: `{sha}`\n\n')
              f.write(gen_table('Standard Builds', std, False))
              f.write(gen_table('SUSFS ඞ Builds', susfs, False))
              f.write('---\n')
              f.write('
